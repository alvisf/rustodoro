name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile toolchain (Linux aarch64 only)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure linker for aarch64-linux
        if: matrix.linker != ''
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "${{ matrix.linker }}"
          EOF

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../rustodoro-${{ github.ref_name }}-${{ matrix.target }}.tar.gz rustodoro

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: rustodoro-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  update-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        run: |
          echo "Tarballs are uploaded. Update the formula manually or via"
          echo "a repository_dispatch event to alvisf/homebrew-tap."
